<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFanuel — Premium App Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 50%, #1a1a3a 100%); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.3);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #f0abfc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-12 md:py-20">
        <!-- Header -->
        <div class="text-center mb-16 animate-in">
            <div class="inline-block mb-6">
                <div class="bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl p-4 shadow-2xl">
                    <i class="fas fa-cube text-4xl text-white"></i>
                </div>
            </div>
            <h1 class="text-6xl md:text-7xl font-bold mb-4">
                <span class="gradient-text">DevFanuel</span>
                <span class="text-white/30">Hub</span>
            </h1>
            <p class="text-white/60 text-xl max-w-2xl mx-auto">Central command for your digital ecosystem</p>
            
            <div class="flex justify-center gap-4 mt-6">
                <div class="px-4 py-2 bg-white/5 rounded-full text-sm text-white/40">
                    <i class="fas fa-rocket mr-2"></i>
                    <span id="appCount">Loading...</span>
                </div>
            </div>
        </div>
        
        <!-- Search -->
        <div class="max-w-2xl mx-auto mb-16 animate-in" style="animation-delay: 0.1s">
            <div class="relative">
                <i class="fas fa-search absolute left-5 top-1/2 transform -translate-y-1/2 text-white/40"></i>
                <input type="text" id="searchInput" placeholder="Search applications... (⌘K)" 
                       class="w-full pl-14 pr-4 py-4 bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl text-white placeholder-white/40 focus:outline-none focus:border-purple-500/50">
                <div class="absolute right-5 top-1/2 transform -translate-y-1/2 text-white/30 text-xs">
                    ⌘K
                </div>
            </div>
        </div>
        
        <!-- Apps Grid -->
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="appGrid">
                <!-- Loading skeletons -->
                <div class="glass-card rounded-2xl h-64 animate-pulse"></div>
                <div class="glass-card rounded-2xl h-64 animate-pulse"></div>
            </div>
        </div>
    </div>
    
    <script>
        let allApps = [];
        
        async function loadApps() {
            try {
                const response = await fetch('/api/apps');
                const data = await response.json();
                
                if (data.success) {
                    allApps = data.apps;
                    document.getElementById('appCount').innerHTML = `${allApps.length} active apps`;
                    renderApps(allApps);
                    
                    // GSAP animation
                    gsap.from('.glass-card:not(.animate-pulse)', {
                        opacity: 0,
                        y: 30,
                        duration: 0.6,
                        stagger: 0.1,
                        ease: "back.out(0.4)"
                    });
                } else {
                    throw new Error('Failed to load apps');
                }
            } catch (error) {
                console.error('Error loading apps:', error);
                document.getElementById('appGrid').innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
                        <p class="text-white/60">Failed to load apps. Please try again later.</p>
                    </div>
                `;
            }
        }
        
        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            if (apps.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-search text-4xl text-white/20 mb-4"></i>
                        <p class="text-white/40">No apps found</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = apps.map(app => `
                <a href="${app.url}" target="_blank" class="glass-card rounded-2xl overflow-hidden group block">
                    <div class="relative h-48 bg-gradient-to-br from-purple-600/20 to-pink-600/20">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i class="fas ${app.icon} text-6xl text-white/20 group-hover:scale-110 transition-transform duration-500"></i>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-white mb-2 group-hover:text-purple-400 transition-colors">
                            ${app.name}
                        </h3>
                        <p class="text-white/40 text-sm line-clamp-2">${app.description}</p>
                        <div class="mt-4 flex items-center justify-between">
                            <span class="text-xs text-white/30 font-mono">${app.subdomain}.${window.location.hostname}</span>
                            <i class="fas fa-arrow-right text-purple-400 opacity-0 group-hover:opacity-100 transition-all group-hover:translate-x-1"></i>
                        </div>
                    </div>
                </a>
            `).join('');
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allApps.filter(app => 
                app.name.toLowerCase().includes(term) || 
                app.description.toLowerCase().includes(term)
            );
            renderApps(filtered);
        });
        
        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
        
        // Load apps on page load
        loadApps();
    </script>
</body>
</html>
